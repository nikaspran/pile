name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libudev-dev \
            libgtk-3-dev

      - name: Verify release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          bundle_version="$(awk '
            /^\[package.metadata.bundle\]$/ { in_bundle = 1; next }
            /^\[/ && in_bundle { exit }
            in_bundle && /^version = / { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.toml)"
          plist_version="$(awk '
            /CFBundleShortVersionString/ { getline; gsub(/^[ \t]*<string>|<\/string>[ \t]*$/, "", $0); print; exit }
          ' assets/Info.plist)"

          test "$tag" = "$cargo_version" || {
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version"
            exit 1
          }
          test "$cargo_version" = "$bundle_version" || {
            echo "Cargo.toml package version $cargo_version does not match bundle version $bundle_version"
            exit 1
          }
          test "$cargo_version" = "$plist_version" || {
            echo "Cargo.toml package version $cargo_version does not match Info.plist version $plist_version"
            exit 1
          }

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets

      - name: Test
        run: cargo test --locked

  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    needs: checks
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ env.TARGET }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            dpkg-dev \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libudev-dev \
            libgtk-3-dev

      - name: Build
        run: cargo build --locked --release --target "$TARGET"

      - name: Package
        run: scripts/package-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-linux-x86_64
          path: |
            dist/pile-*.tar.gz
            dist/pile_*.deb
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    env:
      TARGET: ${{ matrix.target }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_NOTARIZE: ${{ secrets.APPLE_NOTARIZE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ env.TARGET }}

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        run: |
          keychain_password="$(openssl rand -hex 24)"
          security create-keychain -p "$keychain_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$keychain_password" build.keychain
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            build.keychain

      - name: Build
        run: cargo build --locked --release --target "$TARGET"

      - name: Package
        run: scripts/package-macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-macos-${{ matrix.target }}
          path: dist/pile-*.zip
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: checks
    env:
      TARGET: x86_64-pc-windows-msvc
      WINDOWS_SIGNTOOL_CERT_SHA1: ${{ secrets.WINDOWS_SIGNTOOL_CERT_SHA1 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          targets: ${{ env.TARGET }}

      - name: Build
        shell: pwsh
        run: cargo build --locked --release --target "$env:TARGET"

      - name: Package
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-windows-x86_64
          path: dist/pile-*.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - checks
      - linux
      - macos
      - windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Prepare release assets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p dist/release-assets
          find dist/artifacts -type f \( -name 'pile-*' -o -name 'pile_*.deb' \) \
            -exec cp {} dist/release-assets/ \;
          scripts/generate-release-manifest.sh dist/release-assets
          (
            cd dist/release-assets
            sha256sum * > SHA256SUMS
          )
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign dist/release-assets/SHA256SUMS
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign dist/release-assets/pile-update-manifest.json
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-assets/*
