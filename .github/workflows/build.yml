name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libudev-dev \
            libgtk-3-dev

      - name: Verify tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "$tag" = "$version" || {
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
            exit 1
          }

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets

      - name: Test
        run: cargo test --locked

  ubuntu:
    name: Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libudev-dev \
            libgtk-3-dev

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/pile dist/pile-ubuntu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-ubuntu
          path: dist/pile-ubuntu
          if-no-files-found: error

  debian:
    name: Debian
    runs-on: ubuntu-latest
    container: debian:stable
    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libudev-dev \
            libgtk-3-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/pile dist/pile-debian

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-debian
          path: dist/pile-debian
          if-no-files-found: error

  fedora:
    name: Fedora
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install base tools
        run: |
          dnf install -y \
            ca-certificates \
            curl \
            git \
            gcc \
            gcc-c++ \
            make \
            pkgconf-pkg-config \
            libX11-devel \
            libXi-devel \
            mesa-libGL-devel \
            libXrandr-devel \
            libXcursor-devel \
            libXinerama-devel \
            libxkbcommon-devel \
            libxkbcommon-x11-devel \
            wayland-devel \
            systemd-devel \
            gtk3-devel

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/pile dist/pile-fedora

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-fedora
          path: dist/pile-fedora
          if-no-files-found: error

  arch:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install base tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            ca-certificates \
            curl \
            git \
            base-devel \
            pkgconf \
            libx11 \
            libxi \
            mesa \
            libxrandr \
            libxcursor \
            libxinerama \
            libxkbcommon \
            libxkbcommon-x11 \
            wayland \
            systemd \
            gtk3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/pile dist/pile-arch

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-arch
          path: dist/pile-arch
          if-no-files-found: error

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/pile dist/pile-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-macos
          path: dist/pile-macos
          if-no-files-found: error

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Build
        run: cargo build --locked --release

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\pile.exe dist\pile-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-windows
          path: dist/pile-windows.exe
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - checks
      - ubuntu
      - debian
      - fedora
      - arch
      - macos
      - windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/pile-*
